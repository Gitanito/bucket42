<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tabletop Ninja</title>
    <script src="jquery.js"></script>
    <script src="src.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="jquery-ui.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

</head>
<body id="body">
<h1>Micro-VTT</h1>
Invitation ID:
<input id="invid" type="text" value="" placeholder="invitation ID"><br>
<h2>OR</h2>
<input id="vidurl" type="text" value="" placeholder="YOUTUBE or Image URL"><br>
<button onClick="openTable();">Open</button>
<h2>OR</h2>
<button onClick="restoreLastSession();">Restore the last Session</button><br>
<h2>OR</h2>
<button onClick="openTable();">Import a saved setup</button><br><div id="player"></div>
<div id="overlay">
</div>
<div id="drop-region"></div>

<div id="contextMenu" class="dropdown clearfix">
    <ul class="dropdown-menu" role="menu" aria-labelledby="dropdownMenu" style="display:block;position:static;margin-bottom:5px;">
        <li id="elementname_edit"><input type="text" value=""></li>
        <li id="makeplayer"><a tabindex="-1" href="javascript:makePlayer();">This is a Player</a></li>
        <li id="copyurl" alt="Click to copy"></li>
        <li id="copyinvite" alt="Click to copy"></li>
        <li id="togglevisibility"><a tabindex="-1" href="javascript:toggleVisibility();">Toggle visibility</a></li>
        <li id="basesize">Size <a tabindex="-1" href="javascript:makeSize(1);"> 1 </a>|
            <a tabindex="-1" href="javascript:makeSize(2);"> 2 </a>|
            <a tabindex="-1" href="javascript:makeSize(3);"> 3 </a>|
            <a tabindex="-1" href="javascript:makeSize(4);"> 4 </a>|
            <a tabindex="-1" href="javascript:makeSize(5);"> 5 </a></li>
        </li>
        <li><a tabindex="-1" href="javascript:$('#contextMenu').hide();"> Close Menu </a></li>

    </ul>
</div>
<table id="chat"><tr><td style="vertical-align: bottom;" id="chatline"></td></tr></table>
<div id="chatinput"><input type="text" value="" placeholder="Type here"></div>
<div id="diceline">
    <span> 4 </span>|
    <span> 6 </span>|
    <span> 8 </span>|
    <span> 10 </span>|
    <span> 12 </span>|
    <span> 20 </span>|
    <span> 100 </span>|
    <span> +1 </span>
</div>
</body>
</html>
