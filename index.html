			<div id="content"><h1 id="prolog">Prolog</h1>
<p>Er war verwirrt. Und auch ein bisschen ängstlich. Er wusste nicht was er davon halten sollte. Schließlich kannte er die Verstorbene gar nicht. Doch er hatte einen Brief bekommen. Er sollte doch bitte zu einer Beisetzung erscheinen. Doch was hat er mit diesen Leuten zu schaffen? So war ihm ein wenig mulmig zumute. Auch hatte er gar nichts zum Anziehen. Er müsste sich noch seinen Frack oder Anzug besorgen. Sein Anzug war ja letzte Woche vom Sand so verunstaltet worden, dass er von einem kräftigen Schwarz zu einem hellen, leicht bläulichen beige-Ton wechselte. Zum Glück gab es ja seine Haushälterin Frau <a href="Anna.md">Anna</a>. “Sie wird schon eine Lösung finden” dachte er sich. Gerade zu dieser Jahreszeit wo die Sandstürme das ganze Land verwüsten und in den Städten teilweise über 50 Grad herrschten, war eine Bestattungen eine große Ausnahme und es musste eine ganz besondere Persönlichkeit gestorben sein. Hier in der Wüste war das Leben nicht einfach. Aber wem erzähle ich das. Es war noch nie einfach. Zwischen <a href="Bagdabad.md">Bagdabad</a> und <a href="Westoman.md">Westoman</a> konnte man sich zwar gut niederlassen - es gab genug Wasser und auch die Handelsbeziehungen zu den anderen Reichen waren immer sehr ausgeprägt - aber die kriegerischen Auseinandersetzungen und die Wetterbedingungen waren alles andere als menschenfreundlich. An diesem Nachmittag stand jedoch etwas ganz Besonderes auf dem Plan. Eigentlich hatte <a href="Lord%20Bixbi.md">Lord Bixbi</a> geplant, sich mit einem Beduinenführer gleich hinter den verlassenen <a href="Ruinen%20von%20Tambuko.md">Ruinen von Tambuko</a> zu treffen um das weitere Vorgehen beim Kauf dieser seltenen Reliquie zu besprechen. Doch diesen Termin muss er wohl jetzt verschieben. Die Beisetzung scheint wesentlich wichtiger zu sein, zumal er die Person ja nicht mal kannte. so rief er Frau <a href="Anna.md">Anna</a>: "<a href="Anna.md">Anna</a> besorgen Sie mir doch bitte einen Frack! ich habe wichtige Geschäfte in der Stadt! ich bin gegen 14 Uhr zurück und erwarte mir eine Ausstattung für eine Beisetzung! ". Frau <a href="Anna.md">Anna</a> schoss sogleich los um das Nötige zu besorgen. Es war nicht einfach doch sie kannte einige Leute die ihr helfen konnten, ihrem Herrn rechtzeitig das ersehnte Kleidungsstück bereitzustellen. "Wie soll ich dort nur hinkommen?" schoss es <a href="Lord%20Bixbi.md">Lord Bixbi</a> durch den Kopf.</p>
<h1 id="einleitung">Einleitung</h1>
<p>Die Kutsche rasselte über die schlechte Straße. Eigentlich konnte man den plattgedrückten Sand nicht einmal Straße nennen. Es war eine feste Düne wenn man genau sein will. Ihr sitzt im Inneren der Kutsche. Wobei das auch übertrieben wäre - das Dach war praktisch nicht vorhanden. Ein paar Fetzen alten Leders baumelten von den vier Holzstäben an den Ecken. Durch das Rütteln wurden die Fetzen manchmal so beschleunigt, dass sie euch ins Gesicht schnalzen. Ihr fahrt jetzt schon 4 Stunden von <a href="Bagdabad.md">Bagdabad</a> und seid auf dem Weg nach <a href="Westoman.md">Westoman</a>. Erschöpft von eurem letzten Abenteuer hängt ihr auf den heruntergekommenen Sitzen und versucht ein paar Minuten Schlaf zu bekommen. Die Sonne steht hoch am Himmel. Es ist unerträglich heiß. Die Fahrt dürfte noch ein paar Stunden so weiter gehen. Um so glücklicher seid ihr, als ihr ein kleines Städtchen näher kommen seht und der Fahrer Vorbereitungen zur Rast trifft.</p>
<h1 id="treffen">Treffen</h1>
<p>Die Kutsche hält am Straßenrand. Ein kleiner untersetzter Mann steigt ein - ungewöhnlich gut gekleidet - ganz in schwarz. Er wirft dem Fahrer einen Taler zu und schreit mit dünner weinerlicher Stimme hinterher: "Friedhof"</p>
<h1 id="beschnuppern">Beschnuppern</h1>
<p>Der Mann zwängt sich neben euch auf die eh schon viel zu kurze Bank. Er duftet nach Parfüm. Das hilft aber nichts - ihr stinkt wie eine Herde Büffel - und das ist noch untertrieben. Entsprechend angeekelt dreht er seinen halslosen Kopf so weit wie möglich aus der Kutsche hinaus.</p>
<h1 id="kennenlernen">Kennenlernen</h1>
<p>Das ist vielleicht nicht die beste Idee. Als die Kutsche ein wohlplatziertes Schlagloch verlässt, katapultiert es den Mann kopfüber aus der Kutsche. Zum Glück ist <a href="Spieler%201.md">Spieler 1</a> so schnell und kräftig und zieht den Mann mit einem beeindruckenden Ruck in die Kutsche zurück. Die Todesangst und gleichzeitige Erleichterung steht dem Mann ins Gesicht geschrieben. Buchstäblich. Denn sein Gesicht ist so weiß und die Adern so blau, dass man mit etwas Kreativität tatsächlich Buchstaben erkennen könnte. Nachdem er wieder etwas Farbe bekommen hat ist das Eis gebrochen. Er bedankt sich ausschweifend und stellt sich vor. <a href="Lord%20Bixbi.md">Lord Bixbi</a>, <a href="Lord%20Bixbi.md">Lord Bixbi</a>. Er streckt euch seine winzige Hand entgegen und freut sich, euch kennenzulernen. Er hat noch nie Abenteurer in dieser Gegend getroffen. Eigentlich hat er noch nie irgendwelche Abenteurer getroffen - aber so genau muss man ja nicht sein. Ihr stellt euch vor und erzählt von euren Abenteurern. Ihr tragt natürlich kräftig auf und lügt ihm das Blaue vom Himmel vor.</p>
<h1 id="derauftrag">Der Auftrag</h1>
<p>Weil <a href="Lord%20Bixbi.md">Lord Bixbi</a> aus dem Staunen gar nicht mehr herauskommt und seine eigene Jugend - mit den etwa VIER Spaziergängen durch ein kleines Waldgrundstück, was ihm wahnsinnig abenteuerlich vorkam - im Kopf rotiert, fällt ihm der Termin mit den Beduinen wieder ein. Er konnte den Termin ja jetzt nicht wahrnehmen - und das könnte die Beduinen verstimmen und so den Kauf dieses wertvollen Relikts für immer verhindern. Die Lösung liegt für ihn auf der Hand: Die Abenteurer sind die perfekten Verhandler. Sie werden sich nicht unterkriegen lassen und können den Beduinen sicher auf Augenhöhe entgegentreten. Und da sie ihm ja jetzt schon das Leben gerettet hatten waren sie praktisch die vertrauenswürdigsten Menschen auf der Welt. Vorsichtig fragt er: "Habt ihr heute Zeit?" … "Ja, wir wollen nur in die nächste Stadt." … "Wollt ihr 10 Goldtaler verdienen?" … 10 Goldtaler sind fast ein Vermögen. Das verdient man als Abenteurer eher in Jahrzehnten als in Tagen. "Klar!!!!" Schreit ihr ihm gleichzeitig entgegen. "Der Auftrag ist ganz einfach: Trefft euch mit einem Beduinen-König. Er hat etwas für mich. Leider hat er keinen Preis genannt, aber diese Leute sind nicht selten sehr gierig. Ich gebe euch 100 Goldtaler mit, das sollte ausreichen. Eure 10 Goldtaler bekommt ihr sobald ihr mir das Ding übergebt. Wir die Kutsche bringt euch zum Treffpunkt und wieder zurück ins Städtchen. Wir treffen uns bei Sonnenuntergang in dem Café auf dem Marktplatz." </p></div>
